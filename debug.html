<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web</title>
</head>
<body>
    <header>
        <h1>Welcome to ShopTLU</h1>
        <nav aria-label="Điều hướng chính">
            <a href="#home">Trang chủ</a>
            <a href="#products">Sản phẩm</a>
        </nav>
    </header>

    <main>
        <section id="products">
            <h2>Sản phẩm hot</h2>
            <img src="iphone.jpg" alt="iPhone 16 Pro" width="300" height="200">
            <p>iPhone 16 Pro</p>
            <p>Giá: <b>25.990.000đ</b></p>
        </section>

        <section id="info">
            <h2>Thông tin</h2>
            <table>
                <thead>
                    <tr>
                        <th>Tên</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone</td>
                        <td>25tr</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <aside id="home">
        <p>Sidebar content</p>
    </aside>

    <footer>
        <p>Copyright 2026</p>
    </footer>
</body>
</html>
